<!DOCTYPE html>
<html>
<head>
    <title>Icon Generator</title>
</head>
<body>
    <h2>Icon Generator - Open browser console and save the generated images</h2>
    <p>Right-click each canvas and "Save image as..."</p>
    <div id="canvases"></div>

    <script>
        const sizes = [16, 48, 128];
        const svg = `<svg width="128" height="128" xmlns="http://www.w3.org/2000/svg">
            <rect width="128" height="128" fill="#4CAF50"/>
            <path d="M40 50 L60 70 L88 40" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="64" cy="90" r="6" fill="white"/>
            <path d="M58 90 L70 90 M64 84 L64 96" stroke="white" stroke-width="2"/>
        </svg>`;

        const container = document.getElementById('canvases');

        sizes.forEach(size => {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            canvas.style.border = '1px solid black';
            canvas.style.margin = '10px';

            const ctx = canvas.getContext('2d');
            const img = new Image();
            const blob = new Blob([svg], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);

            img.onload = function() {
                ctx.drawImage(img, 0, 0, size, size);
                URL.revokeObjectURL(url);

                // Also create download link
                canvas.toBlob((blob) => {
                    const link = document.createElement('a');
                    link.download = `icon${size}.png`;
                    link.href = URL.createObjectURL(blob);
                    link.textContent = `Download icon${size}.png`;
                    link.style.display = 'block';
                    link.style.margin = '5px';
                    document.body.appendChild(link);
                });
            };

            img.src = url;

            const label = document.createElement('div');
            label.textContent = `${size}x${size}:`;
            container.appendChild(label);
            container.appendChild(canvas);
        });
    </script>
</body>
</html>
