<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Link Converter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body data-theme="dark">
  <div class="container">
    <div class="header">
      <h1>LinkCaster</h1>
      <button id="theme-toggle" class="icon-btn" title="Toggle theme">
        <span class="theme-icon">☀️</span>
      </button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="convert">Convert</button>
      <button class="tab-btn" data-tab="upload-img">Upload Img</button>
      <button class="tab-btn" data-tab="upload-vid">Upload Vid</button>
    </div>

    <!-- Convert Tab -->
    <div id="tab-convert" class="tab-content active">
      <!-- Header with Settings and History Buttons -->
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
        <h3 style="font-size: 14px; font-weight: 600; color: var(--text-primary); margin: 0;">Image Converter</h3>
        <div style="display: flex; gap: 4px;">
          <button id="convert-history-btn" class="icon-btn small" title="Conversion History">📜</button>
          <button id="convert-settings-btn" class="icon-btn small" title="Settings">⚙️</button>
        </div>
      </div>

      <!-- Settings Panel (Hidden by default) -->
      <div class="settings-panel" id="convert-settings-panel" style="display: none;">
        <label for="host-select">Upload Service</label>
        <select id="host-select" style="margin-top: 8px;">
          <option value="catbox">Catbox.moe</option>
          <option value="vgy">vgy.me</option>
          <option value="gdrive">Google Drive</option>
        </select>

        <!-- vgy.me API Key (shown when vgy selected) -->
        <div id="api-settings" style="display: none; margin-top: 12px;">
          <label for="api-key" style="display: block; margin-bottom: 8px;">vgy.me User Key</label>
          <input type="text" id="api-key" placeholder="Enter your vgy.me user key" style="width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--input-bg); color: var(--text-secondary); font-size: 13px;">
          <small id="api-help" style="display: block; margin-top: 6px; color: var(--text-dimmed); font-size: 11px;">Get your user key from <a href="https://vgy.me/account/details" target="_blank" id="api-link" style="color: #4a9eff; text-decoration: none;">vgy.me account</a></small>
          <button id="save-api-key" class="primary" style="margin-top: 8px; width: 100%;">Save API Key</button>
        </div>

        <!-- Google Drive Connection (shown when gdrive selected) -->
        <div class="gdrive-connection" id="convert-gdrive-connection" style="display: none; margin-top: 12px;">
          <label style="display: block; margin-bottom: 8px;">Google Drive Connection</label>
          <div class="button-group" style="margin-bottom: 8px;">
            <button id="convert-gdrive-connect" class="primary">Connect to Google Drive</button>
            <button id="convert-gdrive-unlink" class="secondary" style="display: none;">Unlink</button>
          </div>
          <small id="convert-gdrive-status" style="display: block; color: var(--text-dimmed); font-size: 11px; text-align: center;"></small>
        </div>
      </div>

      <!-- History Panel -->
      <div class="history-panel" id="convert-history-panel" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <label style="margin: 0;">Upload History</label>
          <button id="clear-convert-history" class="secondary" style="font-size: 11px; padding: 4px 8px;">Clear All</button>
        </div>
        <div id="convert-history-list" style="max-height: 300px; overflow-y: auto;">
          <p style="text-align: center; color: var(--text-dimmed); font-size: 12px; padding: 20px;">No uploads yet</p>
        </div>
      </div>

    <div class="input-section">
      <label for="input-text">Paste Links</label>
      <textarea id="input-text" rows="6" placeholder="https://prnt.sc/abc123&#x0a;https://prnt.sc/def456"></textarea>
    </div>

    <div class="status" id="status"></div>

    <div class="button-group">
      <button id="replace-btn" class="primary">Convert</button>
      <button id="clear-btn" class="secondary">Clear</button>
    </div>

    <div class="progress" id="progress" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <p id="progress-text">Processing...</p>
    </div>

    <div class="output-section" id="output-section" style="display: none;">
      <label for="output-text">Converted Links</label>
      <textarea id="output-text" rows="6" readonly></textarea>
      <button id="copy-btn" class="primary">Copy to Clipboard</button>
    </div>
    </div>

    <!-- Upload Img Tab -->
    <div id="tab-upload-img" class="tab-content">
      <div class="upload-section">
        <div class="upload-header">
          <h3>Image Upload</h3>
          <div style="display: flex; gap: 4px;">
            <button id="image-history-btn" class="icon-btn small" title="Upload History">
              <span>📜</span>
            </button>
            <button id="image-settings-btn" class="icon-btn small" title="Settings">
              <span>⚙️</span>
            </button>
          </div>
        </div>

        <!-- Settings Panel -->
        <div class="settings-panel" id="image-settings-panel" style="display: none;">
          <label>Upload Service</label>
          <select id="image-service-select" style="width: 100%; margin-top: 8px;">
            <option value="catbox">Catbox.moe</option>
            <option value="imgur">Imgur (requires API key)</option>
            <option value="gdrive">Google Drive</option>
          </select>

          <!-- Google Drive Connection (shown when Google Drive selected) -->
          <div id="image-gdrive-connection" style="display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color);">
            <label>Google Drive Connection</label>
            <div class="button-group" style="margin-top: 8px;">
              <button id="image-gdrive-connect" class="primary">Connect to Google Drive</button>
              <button id="image-gdrive-unlink" class="secondary" style="display: none;">Unlink</button>
            </div>
            <small id="image-gdrive-status" style="display: block; color: var(--text-dimmed); font-size: 11px; text-align: center; margin-top: 6px;"></small>
          </div>

          <!-- Folder Monitoring -->
          <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color);">
            <label>Auto-Detect New Files</label>
            <button id="image-select-folder" class="secondary" style="width: 100%; margin-top: 8px;">Select Folder to Monitor</button>
            <small id="image-folder-path" style="display: block; color: var(--text-dimmed); font-size: 11px; margin-top: 6px;">No folder selected</small>

            <div style="margin-top: 12px;">
              <label>Only show files from last:</label>
              <input type="number" id="image-time-filter" min="1" max="1440" value="20" style="width: 60px; margin: 8px 4px 0 0;">
              <span style="font-size: 12px;">minutes</span>
            </div>
          </div>
        </div>

        <!-- History Panel -->
        <div class="history-panel" id="image-history-panel" style="display: none;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <label style="margin: 0;">Upload History</label>
            <button id="clear-image-history" class="secondary" style="font-size: 11px; padding: 4px 8px;">Clear All</button>
          </div>
          <div id="image-history-list" style="max-height: 300px; overflow-y: auto;">
            <p style="text-align: center; color: var(--text-dimmed); font-size: 12px; padding: 20px;">No uploads yet</p>
          </div>
        </div>

        <!-- Detected Files List -->
        <div id="image-detected-files" style="display: none; margin-bottom: 12px;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <label style="margin: 0;">Detected Files</label>
            <div style="display: flex; gap: 4px;">
              <button id="image-select-all" class="secondary" style="font-size: 11px; padding: 4px 8px;">Select All</button>
              <button id="image-refresh-files" class="secondary" style="font-size: 11px; padding: 4px 8px;">Refresh</button>
            </div>
          </div>
          <div id="image-file-list" style="max-height: 200px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 4px; padding: 8px;">
            <p style="text-align: center; color: var(--text-dimmed); font-size: 12px; padding: 20px;">No files detected</p>
          </div>
        </div>

        <!-- Status Message for Upload Img Tab -->
        <div class="status" id="image-status" style="display: none;"></div>

        <!-- Upload Area -->
        <div class="input-section">
          <label>Select Images (or use detected files above)</label>
          <input type="file" id="image-file-input" accept="image/*" multiple style="margin-bottom: 8px;">
          <button id="upload-images-btn" class="primary" style="width: 100%;">Upload Selected Files</button>
        </div>

        <div class="progress" id="image-progress" style="display: none;">
          <div class="progress-bar">
            <div class="progress-fill" id="image-progress-fill"></div>
          </div>
          <p id="image-progress-text">Uploading...</p>
        </div>

        <div class="output-section" id="image-output-section" style="display: none;">
          <label>Image Links</label>
          <textarea id="image-output-text" rows="6" readonly></textarea>
          <button id="image-copy-btn" class="primary">Copy All Links</button>
        </div>
      </div>
    </div>

    <!-- Upload Vid Tab -->
    <div id="tab-upload-vid" class="tab-content">
      <div class="gdrive-section">
        <div class="gdrive-header">
          <h3>Google Drive Upload</h3>
          <div style="display: flex; gap: 4px;">
            <button id="video-history-btn" class="icon-btn small" title="Upload History">
              <span>📜</span>
            </button>
            <button id="gdrive-settings-btn" class="icon-btn small" title="Google Drive Settings">
              <span>⚙️</span>
              <span class="error-badge" id="gdrive-error-badge" style="display: none;"></span>
            </button>
          </div>
        </div>

        <!-- Settings Panel -->
        <div class="gdrive-settings" id="gdrive-settings" style="display: none;">
          <!-- Google Drive Connection -->
          <div style="margin-bottom: 12px;">
            <label style="display: block; margin-bottom: 8px;">Google Drive Connection</label>
            <div class="button-group" style="margin-bottom: 8px;">
              <button id="video-gdrive-connect" class="primary">Connect to Google Drive</button>
              <button id="video-gdrive-unlink" class="secondary" style="display: none;">Unlink</button>
            </div>
            <small id="video-gdrive-status" style="display: block; color: var(--text-dimmed); font-size: 11px; text-align: center;"></small>
          </div>

          <!-- Folder Monitoring -->
          <div style="border-top: 1px solid var(--border-color); padding-top: 12px;">
            <label>Auto-Detect New Files</label>
            <button id="video-select-folder" class="secondary" style="width: 100%; margin-top: 8px;">Select Folder to Monitor</button>
            <small id="video-folder-path" style="display: block; color: var(--text-dimmed); font-size: 11px; margin-top: 6px;">No folder selected</small>

            <div style="margin-top: 12px;">
              <label>Only show files from last:</label>
              <input type="number" id="video-time-filter" min="1" max="1440" value="20" style="width: 60px; margin: 8px 4px 0 0;">
              <span style="font-size: 12px;">minutes</span>
            </div>
          </div>
        </div>

        <!-- History Panel -->
        <div class="history-panel" id="video-history-panel" style="display: none;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <label style="margin: 0;">Upload History</label>
            <button id="clear-video-history" class="secondary" style="font-size: 11px; padding: 4px 8px;">Clear All</button>
          </div>
          <div id="video-history-list" style="max-height: 300px; overflow-y: auto;">
            <p style="text-align: center; color: var(--text-dimmed); font-size: 12px; padding: 20px;">No uploads yet</p>
          </div>
        </div>

        <!-- Upload section (visible when connected) -->
        <div id="gdrive-upload-section" style="display: none;">
          <!-- Detected Files List -->
          <div id="video-detected-files" style="margin-bottom: 12px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
              <label style="margin: 0;">Detected Files</label>
              <div style="display: flex; gap: 4px;">
                <button id="video-select-all" class="secondary" style="font-size: 11px; padding: 4px 8px;">Select All</button>
                <button id="video-refresh-files" class="secondary" style="font-size: 11px; padding: 4px 8px;">Refresh</button>
              </div>
            </div>
            <div id="video-file-list" style="max-height: 200px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 4px; padding: 8px;">
              <p style="text-align: center; color: var(--text-dimmed); font-size: 12px; padding: 20px;">No files detected</p>
            </div>
          </div>

          <!-- Status Message for Upload Vid Tab -->
          <div class="status" id="video-status" style="display: none;"></div>

          <div class="input-section">
            <label>Select Video File (or use detected files above)</label>
            <input type="file" id="video-file-input" accept="video/*" style="margin-bottom: 8px;">
            <button id="upload-video-btn" class="primary" style="width: 100%;">Upload to Google Drive</button>
          </div>

          <div class="progress" id="video-progress" style="display: none;">
            <div class="progress-bar">
              <div class="progress-fill" id="video-progress-fill"></div>
            </div>
            <p id="video-progress-text">Uploading...</p>
          </div>

          <div class="output-section" id="video-output-section" style="display: none;">
            <label>Video Link</label>
            <textarea id="video-output-text" rows="3" readonly></textarea>
            <button id="video-copy-btn" class="primary">Copy Link</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/popup.js" type="module"></script>
</body>
</html>
