<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Link Converter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body data-theme="dark">
  <div class="container">
    <div class="header">
      <h1>LinkCaster</h1>
      <button id="theme-toggle" class="icon-btn" title="Toggle theme">
        <span class="theme-icon">☀️</span>
      </button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="convert">Convert</button>
      <button class="tab-btn" data-tab="upload-img">Upload Img</button>
      <button class="tab-btn" data-tab="upload-vid">Upload Vid</button>
    </div>

    <!-- Convert Tab -->
    <div id="tab-convert" class="tab-content active">
      <div class="settings">
      <div class="settings-header">
        <label for="host-select">Upload Service</label>
        <button id="settings-toggle" class="icon-btn small" title="API Settings" style="display: none;">
          <span class="settings-icon">⚙️</span>
          <span class="warning-badge" id="api-warning" style="display: none;">⚠️</span>
        </button>
      </div>
      <select id="host-select">
        <option value="catbox">Catbox.moe</option>
        <option value="freeimage">FreeImage.host</option>
        <option value="vgy">vgy.me</option>
        <option value="flickr">Flickr</option>
        <option value="gyazo">Gyazo</option>
      </select>
      <small class="service-info" id="service-info" style="display: none; margin-top: 6px; color: var(--text-dimmed); font-size: 11px;"></small>
    </div>

    <div class="oauth-container" id="oauth-container" style="display: none;">
      <button id="oauth-connect" class="primary" style="width: 100%; margin-bottom: 12px;">
        <span id="oauth-text">Connect to Flickr</span>
      </button>
      <small id="oauth-status" style="display: block; color: var(--text-dimmed); font-size: 11px; text-align: center;"></small>
    </div>

    <div class="api-settings" id="api-settings" style="display: none;">
      <label for="api-key" id="api-label">API Key</label>
      <input type="text" id="api-key" placeholder="Enter your API key">
      <small id="api-help">Get your API key from <a href="#" target="_blank" id="api-link">here</a></small>
      <button id="save-api-key">Save API Key</button>
    </div>

    <div class="input-section">
      <label for="input-text">Paste Links</label>
      <textarea id="input-text" rows="6" placeholder="https://prnt.sc/abc123&#x0a;https://prnt.sc/def456"></textarea>
    </div>

    <div class="status" id="status"></div>

    <div class="button-group">
      <button id="replace-btn" class="primary">Convert</button>
      <button id="clear-btn" class="secondary">Clear</button>
    </div>

    <div class="progress" id="progress" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <p id="progress-text">Processing...</p>
    </div>

    <div class="output-section" id="output-section" style="display: none;">
      <label for="output-text">Converted Links</label>
      <textarea id="output-text" rows="6" readonly></textarea>
      <button id="copy-btn" class="primary">Copy to Clipboard</button>
    </div>
    </div>

    <!-- Upload Img Tab -->
    <div id="tab-upload-img" class="tab-content">
      <div class="tab-placeholder">
        <p>Upload images from your computer</p>
        <p style="font-size: 12px; color: var(--text-dimmed);">Coming soon...</p>
      </div>
    </div>

    <!-- Upload Vid Tab -->
    <div id="tab-upload-vid" class="tab-content">
      <div class="gdrive-section">
        <div class="gdrive-header">
          <h3>Google Drive Upload</h3>
          <div style="display: flex; gap: 4px;">
            <button id="video-history-btn" class="icon-btn small" title="Upload History">
              <span>📜</span>
            </button>
            <button id="gdrive-settings-btn" class="icon-btn small" title="Google Drive Settings">
              <span>⚙️</span>
              <span class="error-badge" id="gdrive-error-badge" style="display: none;"></span>
            </button>
          </div>
        </div>

        <!-- First-time connection prompt -->
        <div class="gdrive-first-time" id="gdrive-first-time" style="display: none;">
          <div class="gdrive-prompt-card">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
              <span style="font-size: 20px;">🔐</span>
              <strong style="font-size: 13px;">Connect Google Drive</strong>
            </div>
            <p style="font-size: 11px; color: var(--text-dimmed); margin: 0 0 8px 0;">
              Videos will be uploaded to your Google Drive with shareable links.
            </p>
            <button id="gdrive-connect-first" class="primary" style="width: 100%;">
              Connect to Google Drive
            </button>
          </div>
        </div>

        <!-- Settings Panel -->
        <div class="gdrive-settings" id="gdrive-settings" style="display: none;">
          <label>Google Drive Connection</label>
          <div class="button-group" style="margin-top: 8px;">
            <button id="gdrive-connect" class="primary">Connect to Google Drive</button>
            <button id="gdrive-unlink" class="secondary" style="display: none;">Unlink</button>
          </div>
          <small id="gdrive-status" style="display: block; color: var(--text-dimmed); font-size: 11px; text-align: center; margin-top: 6px;"></small>
        </div>

        <!-- History Panel -->
        <div class="history-panel" id="video-history-panel" style="display: none;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <label style="margin: 0;">Upload History</label>
            <button id="clear-video-history" class="secondary" style="font-size: 11px; padding: 4px 8px;">Clear All</button>
          </div>
          <div id="video-history-list" style="max-height: 300px; overflow-y: auto;">
            <p style="text-align: center; color: var(--text-dimmed); font-size: 12px; padding: 20px;">No uploads yet</p>
          </div>
        </div>

        <!-- Upload section (visible when connected) -->
        <div id="gdrive-upload-section" style="display: none;">
          <div class="input-section">
            <label>Select Video File</label>
            <input type="file" id="video-file-input" accept="video/*" style="margin-bottom: 8px;">
            <button id="upload-video-btn" class="primary" style="width: 100%;">Upload to Google Drive</button>
          </div>

          <div class="progress" id="video-progress" style="display: none;">
            <div class="progress-bar">
              <div class="progress-fill" id="video-progress-fill"></div>
            </div>
            <p id="video-progress-text">Uploading...</p>
          </div>

          <div class="output-section" id="video-output-section" style="display: none;">
            <label>Video Link</label>
            <textarea id="video-output-text" rows="3" readonly></textarea>
            <button id="video-copy-btn" class="primary">Copy Link</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
